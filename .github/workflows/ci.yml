name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pdm install

      - name: Lint
        run: pdm run lint

      - name: Typecheck
        run: pdm run typecheck

      - name: Test
        run: pdm run test
