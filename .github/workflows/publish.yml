name: Publish

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pdm install

      - name: Lint
        run: pdm run lint

      - name: Typecheck
        run: pdm run typecheck

      - name: Test
        run: pdm run test

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"

      - name: Build
        run: pdm build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
