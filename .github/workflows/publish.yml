name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"

      - name: Build
        run: pdm build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
